<!DOCTYPE html>
<html lang="ja">
<head>

<body>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
#app{max-width:390px;margin:0 auto;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN',sans-serif;background:#FFF8F0;min-height:100vh;color:#2D1B00;}
.screen{display:none;}.screen.active{display:flex;flex-direction:column;min-height:100vh;}
.topbar{background:#FF8C00;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;}
.topbar-title{font-size:14px;font-weight:700;color:#fff;}
.topbar-right{display:flex;gap:6px;}
.pill{font-size:11px;font-weight:700;padding:4px 10px;border-radius:99px;}
.pill-gold{background:#FFF3CD;color:#7B4F00;}
.pill-pt{background:#E8F4FD;color:#0D5FA0;}
.pill-lv{background:#F0EEFF;color:#4A3AB0;}
.nav{display:grid;grid-template-columns:repeat(5,1fr);background:#FF8C00;}
.nav-btn{padding:8px 2px;font-size:9px;font-weight:700;color:#FFD999;background:transparent;border:none;cursor:pointer;text-align:center;border-bottom:3px solid transparent;transition:all 0.15s;}
.nav-btn.active{color:#fff;border-bottom-color:#fff;background:#E67A00;}
.content{flex:1;padding:12px;overflow-y:auto;}
.card{background:#fff;border-radius:14px;border:1.5px solid #FFD5A0;padding:12px;margin-bottom:10px;box-shadow:0 2px 8px rgba(255,140,0,0.08);}
.card-title{font-size:11px;font-weight:700;color:#E67A00;letter-spacing:0.08em;margin-bottom:8px;}
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px;}
.stat-box{background:#FFF8F0;border-radius:10px;padding:8px 12px;border:1.5px solid #FFD5A0;}
.stat-lbl{font-size:10px;color:#B07030;margin-bottom:2px;}
.stat-val{font-size:18px;font-weight:700;color:#2D1B00;}
.stat-sub{font-size:10px;color:#C08840;margin-top:1px;}
.xp-track{height:6px;background:#FFE8C0;border-radius:3px;overflow:hidden;margin:5px 0 2px;}
.xp-fill{height:100%;background:#FF8C00;transition:width 0.5s;border-radius:3px;}
.btn{display:block;width:100%;padding:13px;font-size:14px;font-weight:700;border-radius:12px;border:2px solid #FFD5A0;background:#fff;color:#2D1B00;cursor:pointer;transition:all 0.15s;margin-bottom:8px;text-align:center;}
.btn:hover{background:#FFF3E0;}
.btn:active{transform:scale(0.97);}
.btn-primary{background:#FF8C00;color:#fff;border-color:#FF8C00;}
.btn-primary:hover{background:#E67A00;border-color:#E67A00;}
.btn-green{background:#22C55E;color:#fff;border-color:#22C55E;}
.btn-green:hover{background:#16A34A;}
.btn-blue{background:#3B82F6;color:#fff;border-color:#3B82F6;}
.btn-gacha{background:linear-gradient(135deg,#FF8C00,#FF4D8C);color:#fff;border:none;font-size:15px;}
.btn-danger{background:#EF4444;color:#fff;border-color:#EF4444;}
.action-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px;}
.action-card{background:#FFF8F0;border-radius:12px;border:2px solid #FFD5A0;padding:10px;cursor:pointer;transition:all 0.15s;}
.action-card:hover{border-color:#FF8C00;background:#FFF3E0;}
.action-card.selected{border-color:#FF8C00;background:#FFF3E0;}
.action-icon{font-size:24px;margin-bottom:4px;}
.action-name{font-size:13px;font-weight:700;color:#2D1B00;}
.action-desc{font-size:10px;color:#B07030;margin-top:2px;line-height:1.3;}
.risk-tag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px;display:inline-block;margin-top:4px;}
.risk-none{background:#DCFCE7;color:#14532D;}.risk-low{background:#FEF9C3;color:#713F12;}.risk-mid{background:#FED7AA;color:#7C2D12;}.risk-high{background:#FECACA;color:#7F1D1D;}.risk-max{background:#EDE9FE;color:#4C1D95;}
.jk-btn{width:88px;height:88px;font-size:40px;border-radius:16px;border:3px solid #FFD5A0;background:#FFF8F0;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;}
.jk-btn:hover{transform:scale(1.12);border-color:#FF8C00;background:#FFF3E0;}
.jk-btn:active{transform:scale(0.95);}
.result-badge{display:inline-block;font-size:26px;font-weight:700;padding:10px 28px;border-radius:16px;margin-bottom:6px;}
.win-badge{background:#DCFCE7;color:#14532D;border:2px solid #22C55E;}
.lose-badge{background:#FEE2E2;color:#7F1D1D;border:2px solid #EF4444;}
.draw-badge{background:#FEF9C3;color:#713F12;border:2px solid #EAB308;}
.rarity-n{color:#6B7280;}.rarity-r{color:#3B82F6;}.rarity-sr{color:#7C3AED;}.rarity-ssr{color:#D97706;}.rarity-ur{color:#DC2626;}
.badge-n{background:#F3F4F6;color:#6B7280;font-size:9px;font-weight:700;padding:1px 6px;border-radius:99px;}
.badge-r{background:#EFF6FF;color:#2563EB;font-size:9px;font-weight:700;padding:1px 6px;border-radius:99px;}
.badge-sr{background:#F5F3FF;color:#6D28D9;font-size:9px;font-weight:700;padding:1px 6px;border-radius:99px;}
.badge-ssr{background:#FFFBEB;color:#B45309;font-size:9px;font-weight:700;padding:1px 6px;border-radius:99px;}
.badge-ur{background:#FFF1F2;color:#BE123C;font-size:9px;font-weight:700;padding:1px 6px;border-radius:99px;}
.staff-card{background:#FFF8F0;border-radius:12px;border:1.5px solid #FFD5A0;padding:10px;margin-bottom:8px;}
.staff-header{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.staff-avatar{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;background:#FFE8C0;flex-shrink:0;}
.staff-name{font-size:13px;font-weight:700;color:#2D1B00;}
.staff-role{font-size:10px;color:#B07030;margin-top:1px;}
.staff-xp-track{height:5px;background:#FFE8C0;border-radius:3px;overflow:hidden;margin:4px 0;}
.staff-xp-fill{height:100%;background:#FF8C00;border-radius:3px;transition:width 0.4s;}
.stat-pills{display:flex;gap:4px;flex-wrap:wrap;}
.stat-pill{font-size:10px;background:#FFF3E0;border:1px solid #FFD5A0;padding:2px 7px;border-radius:99px;color:#B07030;font-weight:600;}
.office-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px;}
.office-cell{aspect-ratio:1;background:#FFF8F0;border-radius:10px;border:2px solid #FFD5A0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:all 0.15s;position:relative;}
.office-cell:hover{border-color:#FF8C00;transform:scale(1.05);}
.office-cell.empty{border-style:dashed;opacity:0.6;}
.office-cell.selected-cell{border-color:#FF8C00;background:#FFF3E0;box-shadow:0 0 0 3px rgba(255,140,0,0.3);}
.office-cell .cell-lbl{font-size:7px;color:#B07030;margin-top:2px;text-align:center;line-height:1.2;}
.shop-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:#FFF8F0;border-radius:10px;border:1.5px solid #FFD5A0;margin-bottom:6px;}
.log-scroll{max-height:72px;overflow-y:auto;background:#FFF8F0;border-radius:8px;padding:6px 10px;border:1px solid #FFD5A0;}
.log-item{font-size:10px;color:#B07030;padding:2px 0;border-bottom:1px solid #FFE8C0;line-height:1.4;}
.gacha-card-anim{animation:gpop 0.5s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes gpop{0%{transform:scale(0.5) rotate(-5deg);opacity:0;}100%{transform:scale(1) rotate(0);opacity:1;}}
.event-banner{background:#FFF3CD;border-radius:12px;padding:10px 12px;margin-bottom:10px;border-left:4px solid #FF8C00;}
.modal-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:100;border-radius:0;}
.modal-box{background:#fff;border-radius:16px;padding:20px;margin:16px;width:100%;max-width:340px;border:2px solid #FFD5A0;}
</style>

<div id="app" style="position:relative;">

      <input id="s-cname" type="text" maxlength="20" placeholder="例: 株式会社スタートアップ" style="width:100%;padding:10px 14px;font-size:14px;border-radius:10px;border:2px solid #FFD5A0;background:#FFF8F0;color:#2D1B00;outline:none;margin-bottom:12px;font-family:inherit;"/>
      <div style="font-size:11px;font-weight:700;color:#B07030;margin-bottom:6px;">社長名</div>
      <input id="s-pname" type="text" maxlength="10" placeholder="例: 田中" style="width:100%;padding:10px 14px;font-size:14px;border-radius:10px;border:2px solid #FFD5A0;background:#FFF8F0;color:#2D1B00;outline:none;margin-bottom:16px;font-family:inherit;"/>
      <button class="btn btn-primary" onclick="setupGame()">🚀 創業する！</button>

  </div>
</div>

<div id="main-screen" class="screen">
  <div class="topbar">
    <div class="topbar-title" id="tb-co">会社名</div>
    <div class="topbar-right">
      <span class="pill pill-gold" id="tb-gold">💰100万</span>
      <span class="pill pill-pt" id="tb-pt">🎯0pt</span>
      <span class="pill pill-lv" id="tb-lv">Lv1</span>
    </div>
  </div>
  <div class="nav">
    <button class="nav-btn active" onclick="switchTab('home')" id="tab-home">🏢<br>経営</button>
    <button class="nav-btn" onclick="switchTab('staff')" id="tab-staff">👥<br>社員</button>
    <button class="nav-btn" onclick="switchTab('office')" id="tab-office">🏠<br>オフィス</button>
    <button class="nav-btn" onclick="switchTab('gacha')" id="tab-gacha">🎰<br>採用</button>
    <button class="nav-btn" onclick="switchTab('more')" id="tab-more">📊<br>記録</button>
  </div>
  <div class="content" id="main-content">
    <div id="view-home"></div>
    <div id="view-staff" style="display:none;"></div>
    <div id="view-office" style="display:none;"></div>
    <div id="view-gacha" style="display:none;"></div>
    <div id="view-more" style="display:none;"></div>
  </div>
</div>

<div id="jk-screen" class="screen">
  <div class="topbar">
    <div class="topbar-title" id="jk-label">じゃんけん！</div>
    <div class="topbar-right"><span class="pill pill-gold" id="jk-gold">💰</span></div>
  </div>
  <div class="content" style="display:flex;flex-direction:column;align-items:center;text-align:center;">
    <div style="font-size:12px;color:#B07030;margin-bottom:16px;padding:10px 14px;background:#FFF8F0;border-radius:10px;border:1.5px solid #FFD5A0;width:100%;line-height:1.5;" id="jk-desc"></div>
    <div style="display:flex;justify-content:center;gap:12px;margin-bottom:16px;" id="jk-hands">
      <button class="jk-btn" onclick="playJK('グー')">✊</button>
      <button class="jk-btn" onclick="playJK('チョキ')">✌️</button>
      <button class="jk-btn" onclick="playJK('パー')">🖐️</button>
    </div>
    <div id="jk-result" style="display:none;width:100%;">
      <div style="font-size:36px;margin-bottom:8px;" id="jk-vs"></div>
      <div id="jk-outcome-badge"></div>
      <div style="font-size:14px;color:#B07030;margin:8px 0 16px;font-weight:600;" id="jk-sub"></div>
      <button class="btn btn-primary" style="font-size:16px;padding:16px;" onclick="afterJK()">次のターンへ ▶</button>
    </div>
    <div class="log-scroll" style="width:100%;margin-top:10px;" id="jk-log"></div>
  </div>
</div>

<div id="gacha-screen" class="screen">
  <div class="topbar">
    <div class="topbar-title">採用ガチャ結果</div>
    <div class="topbar-right"><span class="pill pill-gold" id="gr-gold">💰</span></div>
  </div>
  <div class="content" id="gacha-result-content" style="text-align:center;"></div>
  <div style="padding:0 12px 16px;"><button class="btn btn-primary" onclick="closeGachaScreen()">← 戻る</button></div>
</div>

<div id="office-modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:200;display:none;align-items:flex-end;justify-content:center;">
  <div style="background:#fff;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:390px;max-height:70vh;overflow-y:auto;">
    <div id="office-modal-content"></div>
  </div>
</div>

</div>

const STAFF_DB=[
  {id:1,name:'新卒A田',rarity:'N',emoji:'👶',role:'新卒',desc:'やる気だけは誰にも負けない',sales:3,tech:3,pr:3,luck:6,wage:10},

function load(){
  try{const s=localStorage.getItem('jks_v3');if(s){G=JSON.parse(s);G.collected=new Set(G._col||[]);}}catch(e){}
}
function save(){
  try{const s={...G,_col:[...G.collected]};delete s.collected;localStorage.setItem('jks_v3',JSON.stringify(s));}catch(e){}
}

function getLv(){let c=LEVELS[0];for(const l of LEVELS){if(G.value>=l.min)c=l;else break;}return c;}
function getLaborCost(){return G.staff.reduce((s,st)=>s+(st.onRest?Math.round(st.wage*0.7):st.wage),0);}
function getOfficeBonus(){
  const b={sales:0,tech:0,pr:0,luck:0};
  G.office.forEach(id=>{if(!id)return;const it=OFFICE_ITEMS.find(x=>x.id===id);if(it?.bonus)Object.keys(it.bonus).forEach(k=>{b[k]=(b[k]||0)+it.bonus[k];});});
  return b;
}
function getStaffBonus(key){
  const ob=getOfficeBonus();
  const base=G.staff.filter(s=>!s.onRest).reduce((s,st)=>s+(st[key]||0)*(1+(st.xp||0)/200),0);
  return Math.round(base*(1+(ob[key]||0)/100));
}
function fmt(v){const av=Math.abs(v),sg=v<0?'-':'';if(av>=1000000)return sg+(av/1000000).toFixed(2)+'兆';if(av>=10000)return sg+(av/10000).toFixed(1)+'億';return sg+Math.round(av)+'万';}
function addLog(msg){logs.unshift(msg);}

function selectAction(a){
  if(a.id==='save'){
    const bonus=getStaffBonus('sales');
    const amt=Math.round(20*(1+bonus/200));
    G.money+=amt;G.value+=Math.round(amt*0.1);
    addLog(`[経費削減] +${amt}万円 節約`);
    advanceTurn();return;
  }
  const bonus=getStaffBonus(a.id==='ad'?'pr':a.id==='dev'?'tech':'sales');
  const winAmt=Math.round(a.winBase*(1+bonus/100));
  pendingJK={
    label:a.name,
    desc:`社員ボーナス+${Math.round(bonus)}% 適用\n勝利: +${winAmt}〜${Math.round(winAmt*1.5)}万 / 敗北: ${a.loseBase}万${a.ptReward?`\n勝利で採用Pt +${a.ptReward}pt`:'' }`,
    ptReward:a.ptReward||0,
    onWin(){
      const tot=winAmt+Math.round(winAmt*Math.random()*0.5);
      if(a.id==='ad'){G.value+=tot;}else{G.money+=tot;G.value+=Math.round(tot*0.3);}
      G.gachaPt+=a.ptReward||0;
      G.staff.forEach(s=>{s.xp=(s.xp||0)+2;});
      addLog(`[${a.name}] 勝利 +${tot}万${a.ptReward?` 採用Pt+${a.ptReward}`:''}`);
      return`+${tot}万円獲得！${a.ptReward?` (+${a.ptReward}pt)`:'' }`;
    },
    onDraw(){
      if(a.id==='ad')G.value+=a.drawBase;else G.money+=a.drawBase;
      G.staff.forEach(s=>{s.xp=(s.xp||0)+1;});
      addLog(`[${a.name}] 引き分け +${a.drawBase}万`);
      return`引き分け +${a.drawBase}万`;
    },
    onLose(){
      G.money+=a.loseBase;G.value+=Math.round(a.loseBase*0.2);
      addLog(`[${a.name}] 敗北 ${a.loseBase}万`);
      return`${a.loseBase}万の損失...`;
    }
  };
  document.getElementById('jk-label').textContent='【'+a.name+'】じゃんけん！';
  document.getElementById('jk-desc').textContent=pendingJK.desc;
  document.getElementById('jk-hands').style.display='flex';
  document.getElementById('jk-result').style.display='none';
  document.getElementById('jk-log').innerHTML=logs.slice(0,4).map(l=>`<div class="log-item">${l}</div>`).join('');
  showScreen('jk-screen');
}

function playJK(myHand){
  const en=HANDS[Math.floor(Math.random()*3)];
  document.getElementById('jk-hands').style.display='none';
  document.getElementById('jk-vs').textContent=HEMOJI[myHand]+' VS '+HEMOJI[en];
  const out=judgeJK(myHand,en);
  let sub='',badge='';
  if(out==='win'){G.wins++;sub=pendingJK.onWin();badge=`<span class="result-badge win-badge">勝利！</span>`;}
  else if(out==='draw'){G.draws++;sub=pendingJK.onDraw();badge=`<span class="result-badge draw-badge">引き分け</span>`;}
  else{G.losses++;sub=pendingJK.onLose();badge=`<span class="result-badge lose-badge">敗北...</span>`;}
  document.getElementById('jk-outcome-badge').innerHTML=badge;
  document.getElementById('jk-sub').textContent=sub;
  document.getElementById('jk-result').style.display='block';
  if(G.money<-200&&G.value<=0){addLog('💸 倒産！リセット');G.money=100;G.value=100;G.staff=[];}
  save();updateTop();
}

function afterJK(){showScreen('main-screen');advanceTurn();}
function judgeJK(my,en){if(my===en)return'draw';if((my==='グー'&&en==='チョキ')||(my==='チョキ'&&en==='パー')||(my==='パー'&&en==='グー'))return'win';return'lose';}

function advanceTurn(){
  G.turn++;G.day+=3;
  if(G.day>=G.nextPayday)doPayday();
  if(G.turn%12===0&&Math.random()<0.5){
    const ev=BONUS_EVENTS[Math.floor(Math.random()*BONUS_EVENTS.length)];
    const result=ev.effect(G);
    addLog(`🎉 ${ev.name}: ${result}`);
  }
  save();switchTab('home');
}

function doPayday(){
  G.nextPayday+=30;
  const labor=getLaborCost();
  if(labor===0){addLog('💸 給料日（無給）');return;}
  if(G.money>=labor){G.money-=labor;G.totalLabor+=labor;addLog(`✅ 給料日 -${labor}万完了`);}
  else{
    addLog('⚠️ 給料不足！社員を1名解雇');
    if(G.staff.length>0){const f=G.staff.pop();addLog(`😢 リストラ: ${f.name}`);}
    G.money=Math.max(0,G.money-labor);
  }
}

function trainStaff(i){
  if(G.money<30){alert('資金不足！30万必要');return;}

  s.xp=(s.xp||0)+25;s.morale=Math.min(100,(s.morale||50)+10);
  const keys=['sales','tech','pr','luck'];
  const k=keys[Math.floor(Math.random()*keys.length)];

    <div style="text-align:center;background:#FFF8F0;border-radius:10px;padding:12px;margin-bottom:10px;border:1.5px solid #FFD5A0;">
      <div style="font-size:28px;font-weight:700;color:#FF8C00;">${G.gachaPt}<span style="font-size:14px;">pt</span></div>
      <div style="font-size:11px;color:#B07030;">1回 ${GACHA_COST_PT}pt / 10連 ${GACHA_COST_PT*10}pt</div>
    </div>
    <button class="btn btn-gacha" onclick="doGacha(1)" ${G.gachaPt<GACHA_COST_PT?'disabled style="opacity:0.5;"':''}>🎰 1回引く (${GACHA_COST_PT}pt)</button>
    <button class="btn btn-gacha" onclick="doGacha(10)" style="background:linear-gradient(135deg,#7C3AED,#DB2777);" ${G.gachaPt<GACHA_COST_PT*10?'disabled style="opacity:0.5;background:linear-gradient(135deg,#7C3AED,#DB2777);"':''}>🎰✨ 10連 (${GACHA_COST_PT*10}pt)</button>
  </div>
  <div class="card"><div class="card-title">排出率</div>
    ${RARITIES.map((r,i)=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #FFE8C0;"><span class="rarity-${r.toLowerCase()}" style="font-weight:700;">${r}</span><span style="font-size:11px;color:#B07030;">${RARITY_WEIGHT[i]}%</span></div>`).join('')}
  </div>`;
  document.getElementById('view-gacha').innerHTML=h;
}

function rollRarity(){let r=Math.random()*100;for(let i=0;i<RARITIES.length;i++){if((r-=RARITY_WEIGHT[i])<=0)return RARITIES[i];}return'N';}

function doGacha(times){
  if(G.gachaPt<GACHA_COST_PT*times){alert(`採用ポイントが足りません！\n必要: ${GACHA_COST_PT*times}pt / 現在: ${G.gachaPt}pt`);return;}
  G.gachaPt-=GACHA_COST_PT*times;G.gachaCount=(G.gachaCount||0)+times;
  const results=[];
  for(let i=0;i<times;i++){
    const r=rollRarity();
    const pool=STAFF_DB.filter(s=>s.rarity===r);
    const s={...pool[Math.floor(Math.random()*pool.length)],xp:0,morale:50,onRest:false};
    const isNew=!G.collected.has(s.id);
    G.collected.add(s.id);G.staff.push(s);G.hired++;
    addLog(`🎰 採用: ${s.name} [${s.rarity}]${isNew?' NEW!':''}`);
    results.push({...s,isNew});
  }
  save();updateTop();
  let h='';
  if(results.length===1){
    const s=results[0];const bc='badge-'+s.rarity.toLowerCase();
    h=`<div style="text-align:center;padding:20px 0;">
      ${s.isNew?`<div style="background:#FEF3C7;color:#92400E;font-size:11px;font-weight:700;padding:4px 16px;border-radius:99px;display:inline-block;margin-bottom:10px;">NEW RECRUIT!</div>`:''}
      <div class="gacha-card-anim" style="background:#FFF8F0;border-radius:20px;border:3px solid #FF8C00;padding:24px;margin-bottom:16px;display:inline-block;min-width:200px;">
        <div style="font-size:56px;margin-bottom:8px;">${s.emoji}</div>
        <div style="font-size:20px;font-weight:700;margin-bottom:4px;">${s.name}</div>
        <span class="${bc}">${s.rarity}</span>
        <div style="font-size:12px;color:#B07030;margin:8px 0;">${s.role}</div>
        <div style="font-size:11px;color:#6B7280;font-style:italic;margin-bottom:10px;">${s.desc}</div>
        <div class="stat-pills" style="justify-content:center;"><span class="stat-pill">営業${s.sales}</span><span class="stat-pill">技術${s.tech}</span><span class="stat-pill">広報${s.pr}</span><span class="stat-pill">運${s.luck}</span></div>
      </div>
    </div>`;
  } else {
    h=`<div style="padding-bottom:8px;"><div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;">`;
    results.forEach(s=>{const bc='badge-'+s.rarity.toLowerCase();
      h+=`<div class="gacha-card-anim" style="background:#FFF8F0;border-radius:12px;border:2px solid ${s.rarity==='UR'?'#DC2626':s.rarity==='SSR'?'#D97706':s.rarity==='SR'?'#7C3AED':'#FFD5A0'};padding:10px;text-align:center;">
        ${s.isNew?`<div style="font-size:8px;color:#D97706;font-weight:700;">NEW</div>`:''}
        <div style="font-size:28px;">${s.emoji}</div>
        <div style="font-size:11px;font-weight:700;">${s.name}</div>
        <span class="${bc}">${s.rarity}</span>
      </div>`;
    });
    h+=`</div></div>`;
  }
  document.getElementById('gacha-result-content').innerHTML=h;
  showScreen('gacha-screen');
}

function closeGachaScreen(){showScreen('main-screen');switchTab('gacha');}

function renderMore(){
  const lv=getLv();
  let h=`<div class="card"><div class="card-title">会社の戦績</div>
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-lbl">勝利数</div><div class="stat-val">${G.wins}</div></div>
      <div class="stat-box"><div class="stat-lbl">敗北数</div><div class="stat-val">${G.losses}</div></div>
      <div class="stat-box"><div class="stat-lbl">総人件費</div><div class="stat-val">${fmt(G.totalLabor)}</div></div>
      <div class="stat-box"><div class="stat-lbl">採用数</div><div class="stat-val">${G.hired}人</div></div>
      <div class="stat-box"><div class="stat-lbl">ガチャ回数</div><div class="stat-val">${G.gachaCount||0}</div></div>
      <div class="stat-box"><div class="stat-lbl">図鑑達成率</div><div class="stat-val">${Math.round(G.collected.size/STAFF_DB.length*100)}%</div></div>
    </div>
  </div>`;
  h+=`<button class="btn btn-danger" onclick="if(confirm('全データをリセットしますか？')){localStorage.removeItem('jks_v3');location.reload();}">⚠️ データをリセット</button>`;
  document.getElementById('view-more').innerHTML=h;
}

function setupGame(){
  const cname=document.getElementById('s-cname').value.trim()||'株式会社スタートアップ';
  const pname=document.getElementById('s-pname').value.trim()||'社長';
  initG(cname,pname);save();
  showScreen('main-screen');switchTab('home');
}

load();
if(G.company){showScreen('main-screen');switchTab('home');}
else{showScreen('setup-screen');}
</script>

</body>
